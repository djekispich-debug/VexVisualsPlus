buildscript {
    repositories {
        maven {
            name = 'Fabric'
            url = 'https://fabricmc.net'
        }
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'net.fabricmc:fabric-loom:1.11.8'
    }
}

// Застосовуємо завантажений через buildscript плагін
apply plugin: 'net.fabricmc.loom'
apply plugin: 'maven-publish'

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

// ОФІЦІЙНИЙ ФІКС ДЛЯ ВИМКНЕННЯ ВАЛІДАЦІЇ JAVADOC У LOOM 1.11+:
loom {
    dependencyJavadocEnabled.set(false)
}

repositories {
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"

    mappings "net.fabricmc:yarn:${yarn_mappings}:v2"

    modImplementation "net.fabricmc:fabric-loader:${loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_api_version}"
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    options.release = Integer.parseInt(project.java_version)
    options.compilerArgs << "-Xlint:-options" << "-Xdoclint:none"
}
