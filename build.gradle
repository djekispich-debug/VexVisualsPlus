plugins {
    id 'fabric-loom' version "${loom_version}"
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

// ПРАВИЛЬНИЙ СИНТАКСИС ДЛЯ ВИМКНЕННЯ JAVADOC У LOOM 1.11+:
loom {
    decompilers {
        vineflower {
            options.set([
                'hdc': '0', // Вимикає генерацію коментарів javadoc декомпілятором
                'dgs': '1'
            ])
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"

    mappings "net.fabricmc:yarn:${yarn_mappings}:v2"

    modImplementation "net.fabricmc:fabric-loader:${loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_api_version}"
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    options.release = Integer.parseInt(project.java_version)
    options.compilerArgs << "-Xlint:-options" << "-Xdoclint:none"
}
