plugins {
    id "fabric-loom" version "1.7.4"
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

// ПРАВИЛЬНИЙ СИНТАКСИС ДЛЯ LOOM 1.7.4:
loom {
    // Вимикає генерацію та перевірку javadoc для сторонніх модів із середовища
    it.getLifecycle().afterEvaluate {
        it.dependencies.each { dep ->
            if (dep.name.contains("fabric-api")) {
                dep.transitive = true
            }
        }
    }
}

// Додатково кажемо Gradle ігнорувати завантаження Javadoc-класів з мавенів
gradle.projectsEvaluated {
    tasks.withType(GenerateModuleMetadata) {
        enabled = false
    }
}

repositories {
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:${loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_api_version}"
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    options.release = Integer.parseInt(project.java_version)
    options.compilerArgs << "-Xlint:-options" << "-Xdoclint:none"
}
