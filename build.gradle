buildscript {
    repositories {
        maven {
            name = "Fabric"
            url = "https://fabricmc.net"
        }
        mavenCentral()
        maven {
            url "https://maven.architectury.dev"
        }
        maven {
            url "https://maven.fabricmc.net"
        }
    }
    dependencies {
        classpath "net.fabricmc:fabric-loom:1.7.2"
    }
}

// Застосовуємо плагін через завантажений buildscript
apply plugin: "net.fabricmc.loom"

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    mavenCentral()
    maven {
        name = "Fabric"
        url = "https://fabricmc.net"
    }
    maven {
        url "https://maven.fabricmc.net"
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings "net.fabricmc:yarn:${yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_api_version}"
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    options.release.set(Integer.parseInt(project.java_version))
    options.compilerArgs.addAll(["-Xlint:-options", "-Xdoclint:none"])
}
