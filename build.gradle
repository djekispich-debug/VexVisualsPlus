name: Build VexVisualsPlus

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Оновлюємо версію Gradle до 8.11 для повної сумісності з Loom 1.9.2
      - name: Setup Gradle 8.11
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11'
          cache-disabled: true # Залишаємо вимкненим для чистого проходу

      # Запускаємо збірку напряму
      - name: Build mod with system Gradle
        run: gradle clean genSources build --no-daemon --stacktrace --refresh-dependencies

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: VexVisualsPlus
          path: build/libs/*.jar
