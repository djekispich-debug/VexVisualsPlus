name: Build VexVisualsPlus

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Екшен сам надасть чистий Gradle 8.10 та виконає збірку без використання локального ворпера
      - name: Run Gradle Build
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'
          cache-disabled: true # Залишаємо вимкненим, щоб уникнути конфліктів кешу
          arguments: clean genSources build --no-daemon --stacktrace --refresh-dependencies

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: VexVisualsPlus
          path: build/libs/*.jar
