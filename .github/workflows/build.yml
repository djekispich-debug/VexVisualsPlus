name: Build VexVisualsPlus

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Install Gradle 9.4.1 (bootstrap)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
          cache-disabled: true

      - name: Regenerate wrapper and verify version
        run: |
          gradle wrapper --gradle-version=9.4.1 --distribution-type=bin
          chmod +x gradlew
          ./gradlew --version
          ./gradlew --version | grep -F "Gradle 9.4.1"

      - name: Build mod
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: VexVisualsPlus
          path: build/libs/*.jar
