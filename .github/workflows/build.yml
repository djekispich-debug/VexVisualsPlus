name: Build VexVisualsPlus

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 1. Налаштовуємо чисте середовище Gradle 8.10
      - name: Setup Gradle 8.10
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'
          cache-disabled: true # Залишаємо вимкненим для повної ізоляції

      # 2. Крок-порятунок: Генеруємо відсутній файл gradle-wrapper.jar прямо у хмарі
      - name: Regenerate missing Gradle Wrapper
        run: gradle wrapper --gradle-version=8.10 --distribution-type=bin

      # 3. Запускаємо збірку моду стандартним та безпечним способом
      - name: Build mod
        run: ./gradlew clean genSources build --no-daemon --stacktrace --refresh-dependencies

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: VexVisualsPlus
          path: build/libs/*.jar
