name: Build VexVisualsPlus

on:
workflow_dispatch:
push:
branches: [ main, master ]
pull_request:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up JDK 21
    uses: actions/setup-java@v4
    with:
      java-version: '21'
      distribution: 'temurin'

  - name: Make gradlew executable
    run: chmod +x gradlew

  - name: Verify Gradle version
    run: ./gradlew --version

  - name: Build mod
    run: ./gradlew clean genSources build --no-daemon --stacktrace --refresh-dependencies

  - name: Upload JAR
    uses: actions/upload-artifact@v4
    with:
      name: VexVisualsPlus
      path: build/libs/*.jar
```
