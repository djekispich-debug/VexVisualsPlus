name: Build VexVisualsPlus

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Теперь используем Gradle 9.2.1 (совместим с Fabric Loom 1.14.1)
      - name: Setup Gradle 9.2.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.2.1'
          cache-disabled: true

      - name: Build mod with system Gradle
        run: gradle clean genSources build --no-daemon --stacktrace --refresh-dependencies -Dloom.disableJavadocProcessor=true

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: VexVisualsPlus
          path: build/libs/*.jar
